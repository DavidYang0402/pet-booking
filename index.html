<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寵物預約</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

  :root {
    --primary: #3d7a5e;
    --primary-light: #e8f4ef;
    --primary-dark: #2a5c45;
    --accent: #f0a500;
    --bg: #f7f9f8;
    --card: #ffffff;
    --text: #1a2e25;
    --text-muted: #6b8478;
    --border: #d4e4dc;
    --radius: 14px;
    --shadow: 0 2px 16px rgba(61,122,94,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* Header */
  .header {
    background: var(--primary);
    padding: 24px 20px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -20px; left: -20px;
    width: 80px; height: 80px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }
  .header-icon { font-size: 36px; margin-bottom: 8px; }
  .header h1 {
    color: #fff;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .header p {
    color: rgba(255,255,255,0.75);
    font-size: 13px;
    margin-top: 4px;
  }

  /* Progress */
  .progress-bar {
    background: var(--card);
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .progress-steps {
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
  }
  .progress-steps::before {
    content: '';
    position: absolute;
    top: 14px; left: 14px; right: 14px;
    height: 2px;
    background: var(--border);
    z-index: 0;
  }
  .progress-fill {
    position: absolute;
    top: 14px; left: 14px;
    height: 2px;
    background: var(--primary);
    transition: width 0.4s ease;
    z-index: 1;
  }
  .step-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--border);
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 2;
    transition: all 0.3s;
  }
  .step-dot.active {
    background: var(--primary);
    color: #fff;
    box-shadow: 0 0 0 4px var(--primary-light);
  }
  .step-dot.done {
    background: var(--primary);
    color: #fff;
  }
  .step-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
  }
  .step-label {
    font-size: 10px;
    color: var(--text-muted);
    text-align: center;
    flex: 1;
  }
  .step-label.active { color: var(--primary); font-weight: 700; }

  /* Sections */
  .section {
    display: none;
    padding: 20px 16px 0;
    animation: fadeIn 0.3s ease;
  }
  .section.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .section-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--primary-dark);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title span { font-size: 20px; }

  /* Card */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }

  /* Form Fields */
  .field { margin-bottom: 18px; }
  .field:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .required::after {
    content: ' *';
    color: #e05252;
  }

  input[type="text"],
  input[type="tel"],
  input[type="date"],
  input[type="number"],
  select,
  textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    color: var(--text);
    background: var(--bg);
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-light);
    background: #fff;
  }
  textarea { resize: none; min-height: 80px; }

  /* Radio & Checkbox Groups */
  .radio-group, .check-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .radio-group label, .check-group label {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border: 1.5px solid var(--border);
    border-radius: 30px;
    font-size: 13px;
    font-weight: 400;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    background: var(--bg);
    margin-bottom: 0;
  }
  .radio-group input[type="radio"],
  .check-group input[type="checkbox"] {
    width: auto;
    padding: 0;
    border: none;
    box-shadow: none;
    accent-color: var(--primary);
  }
  .radio-group label:has(input:checked),
  .check-group label:has(input:checked) {
    background: var(--primary-light);
    border-color: var(--primary);
    color: var(--primary-dark);
    font-weight: 500;
  }

  /* Service Cards */
  .service-card {
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--bg);
  }
  .service-card:has(input:checked) {
    background: var(--primary-light);
    border-color: var(--primary);
  }
  .service-card label {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    margin-bottom: 0;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }
  .service-card input[type="radio"],
  .service-card input[type="checkbox"] {
    width: auto;
    padding: 0;
    border: none;
    box-shadow: none;
    accent-color: var(--primary);
    flex-shrink: 0;
  }

  /* Agree Box */
  .agree-box {
    background: var(--primary-light);
    border: 1.5px solid var(--primary);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .agree-box label {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    margin-bottom: 0;
    font-weight: 400;
  }
  .agree-box input[type="checkbox"] {
    width: auto;
    padding: 0;
    border: none;
    box-shadow: none;
    accent-color: var(--primary);
    margin-top: 2px;
    flex-shrink: 0;
  }

  /* Navigation Buttons */
  .nav-buttons {
    display: flex;
    gap: 12px;
    padding: 20px 16px;
  }
  .btn {
    flex: 1;
    padding: 16px;
    border-radius: var(--radius);
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }
  .btn-prev {
    background: var(--card);
    color: var(--text-muted);
    border: 1.5px solid var(--border);
  }
  .btn-next {
    background: var(--primary);
    color: #fff;
    box-shadow: 0 4px 14px rgba(61,122,94,0.3);
  }
  .btn-next:active { transform: scale(0.97); }
  .btn-submit {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 14px rgba(240,165,0,0.35);
  }

  /* Success Screen */
  #success-screen {
    display: none;
    text-align: center;
    padding: 60px 30px;
    animation: fadeIn 0.5s ease;
  }
  .success-icon {
    width: 80px; height: 80px;
    background: var(--primary-light);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    margin: 0 auto 24px;
  }
  #success-screen h2 {
    font-size: 22px;
    color: var(--primary-dark);
    margin-bottom: 12px;
  }
  #success-screen p {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.7;
  }

  /* Loading */
  #loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  #loading-overlay.show { display: flex; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .note { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
  .divider {
    height: 1px;
    background: var(--border);
    margin: 16px 0;
  }
  .sub-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--primary);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
    margin-top: 16px;
  }
  .sub-label:first-child { margin-top: 0; }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <p style="color:var(--text-muted);font-size:14px;">提交中，請稍候…</p>
</div>

<!-- Header -->
<div class="header">
  <div class="header-icon">🐾</div>
  <h1>寵物美容預約</h1>
  <p>填寫完成後將自動送出預約</p>
</div>

<!-- Progress -->
<div class="progress-bar">
  <div class="progress-steps">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    <div class="step-dot active" id="dot-1">1</div>
    <div class="step-dot" id="dot-2">2</div>
    <div class="step-dot" id="dot-3">3</div>
    <div class="step-dot" id="dot-4">4</div>
  </div>
  <div class="step-labels">
    <div class="step-label active" id="label-1">飼主資料</div>
    <div class="step-label" id="label-2">寵物資料</div>
    <div class="step-label" id="label-3">預約項目</div>
    <div class="step-label" id="label-4">確認送出</div>
  </div>
</div>

<!-- SECTION 1: 飼主資料 -->
<div class="section active" id="section-1">
  <div class="section-title"><span>👤</span> 飼主資料</div>
  <div class="card">
    <div class="field">
      <label class="required">飼主姓名</label>
      <input type="text" id="ownerName" placeholder="請輸入姓名">
    </div>
    <div class="field">
      <label class="required">聯絡電話</label>
      <input type="tel" id="phone" placeholder="0912-345-678">
    </div>
    <div class="field">
      <label>通訊地址</label>
      <input type="text" id="address" placeholder="請輸入地址">
    </div>
    <div class="field">
      <label>身分證字號 <span style="color:var(--text-muted);font-weight:400">（住宿必填，防棄養用）</span></label>
      <input type="text" id="idNumber" placeholder="A123456789">
    </div>
    <div class="field">
      <label>是否為飼主本人</label>
      <div class="radio-group">
        <label><input type="radio" name="isSelf" value="是" checked> 是</label>
        <label><input type="radio" name="isSelf" value="否"> 否</label>
      </div>
    </div>
    <div class="field">
      <label>第二聯絡人</label>
      <input type="text" id="secondContact" placeholder="姓名 / 電話">
    </div>
  </div>
</div>

<!-- SECTION 2: 寵物資料 -->
<div class="section" id="section-2">
  <div class="section-title"><span>🐶</span> 寵物資料</div>
  <div class="card">
    <div class="field">
      <label class="required">寵物名</label>
      <input type="text" id="petName" placeholder="請輸入寵物名字">
    </div>
    <div class="field">
      <label class="required">品種</label>
      <input type="text" id="breed" placeholder="例：柴犬、貴賓">
    </div>
    <div class="field">
      <label>生日</label>
      <input type="date" id="birthday">
    </div>
    <div class="field">
      <label>性別</label>
      <div class="radio-group">
        <label><input type="radio" name="gender" value="公" checked> 公</label>
        <label><input type="radio" name="gender" value="母"> 母</label>
      </div>
    </div>
    <div class="field">
      <label>結紮</label>
      <div class="radio-group">
        <label><input type="radio" name="neutered" value="已結紮" checked> 已結紮</label>
        <label><input type="radio" name="neutered" value="未結紮"> 未結紮</label>
      </div>
    </div>
    <div style="display:flex;gap:12px">
      <div class="field" style="flex:1">
        <label>體重（kg）</label>
        <input type="number" id="weight" placeholder="5" step="0.1">
      </div>
      <div class="field" style="flex:1">
        <label>體長（cm）</label>
        <input type="number" id="length" placeholder="40">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="sub-label">個性 / 行為</div>
    <div class="field">
      <label>情緒穩定度</label>
      <div class="check-group">
        <label><input type="checkbox" name="emotion" value="穩定"> 穩定</label>
        <label><input type="checkbox" name="emotion" value="容易緊張"> 容易緊張</label>
        <label><input type="checkbox" name="emotion" value="易受驚嚇"> 易受驚嚇</label>
        <label><input type="checkbox" name="emotion" value="情緒波動大"> 情緒波動大</label>
      </div>
    </div>
    <div class="field">
      <label>活動性</label>
      <div class="check-group">
        <label><input type="checkbox" name="activity" value="溫馴"> 溫馴</label>
        <label><input type="checkbox" name="activity" value="活潑"> 活潑</label>
        <label><input type="checkbox" name="activity" value="易緊張"> 易緊張</label>
      </div>
    </div>
    <div class="field">
      <label>社交偏好</label>
      <div class="check-group">
        <label><input type="checkbox" name="social" value="親貓狗"> 親貓狗</label>
        <label><input type="checkbox" name="social" value="不親貓狗"> 不親貓狗</label>
        <label><input type="checkbox" name="social" value="親人"> 親人</label>
        <label><input type="checkbox" name="social" value="害怕人"> 害怕人</label>
        <label><input type="checkbox" name="social" value="親其他狗"> 親其他狗</label>
        <label><input type="checkbox" name="social" value="害怕其他狗"> 害怕其他狗</label>
      </div>
    </div>
    <div class="field">
      <label>行為特徵</label>
      <div class="check-group">
        <label><input type="checkbox" name="behavior" value="攻擊行為"> 攻擊行為</label>
        <label><input type="checkbox" name="behavior" value="咬人"> 咬人</label>
        <label><input type="checkbox" name="behavior" value="追逐"> 追逐</label>
        <label><input type="checkbox" name="behavior" value="破壞物品"> 破壞物品</label>
        <label><input type="checkbox" name="behavior" value="攻擊玩具/食物"> 攻擊玩具/食物</label>
      </div>
    </div>
    <div class="field" id="aggression-note-field" style="display:none">
      <label>攻擊行為情境描述</label>
      <textarea id="aggressionNote" placeholder="請描述攻擊行為發生的情境…"></textarea>
    </div>
    <div class="field">
      <label>應激反應</label>
      <div class="check-group">
        <label><input type="checkbox" name="stress" value="容易叫/吠"> 容易叫/吠</label>
        <label><input type="checkbox" name="stress" value="容易掙扎"> 容易掙扎</label>
        <label><input type="checkbox" name="stress" value="容易跳躍"> 容易跳躍</label>
        <label><input type="checkbox" name="stress" value="無明顯應激"> 無明顯應激</label>
      </div>
    </div>
    <div class="field">
      <label>洗澡耐受度</label>
      <div class="check-group">
        <label><input type="checkbox" name="bathTolerance" value="喜歡水"> 喜歡水</label>
        <label><input type="checkbox" name="bathTolerance" value="不喜歡水"> 不喜歡水</label>
        <label><input type="checkbox" name="bathTolerance" value="無感"> 無感</label>
      </div>
    </div>
    <div class="field">
      <label>其他行為備註</label>
      <div class="check-group" style="margin-bottom:8px">
        <label><input type="checkbox" name="otherBehavior" value="分離焦慮"> 分離焦慮</label>
      </div>
      <input type="text" id="otherBehaviorText" placeholder="其他備註…">
    </div>
  </div>

  <div class="card">
    <div class="sub-label">健康狀況</div>
    <div class="field">
      <label>病史</label>
      <textarea id="medicalHistory" placeholder="請描述過往病史或用藥情況…"></textarea>
    </div>
    <div class="field">
      <label>最近膚況</label>
      <div class="check-group">
        <label><input type="checkbox" name="skinCondition" value="正常"> 正常</label>
        <label><input type="checkbox" name="skinCondition" value="搔癢"> 搔癢</label>
        <label><input type="checkbox" name="skinCondition" value="乾燥"> 乾燥</label>
        <label><input type="checkbox" name="skinCondition" value="紅疹"> 紅疹</label>
        <label><input type="checkbox" name="skinCondition" value="皮屑"> 皮屑</label>
        <label><input type="checkbox" name="skinCondition" value="黃垢"> 黃垢</label>
        <label><input type="checkbox" name="skinCondition" value="禿毛"> 禿毛</label>
        <label><input type="checkbox" name="skinCondition" value="黴菌"> 黴菌</label>
        <label><input type="checkbox" name="skinCondition" value="其他"> 其他</label>
      </div>
    </div>
    <div class="field">
      <label>最近健康狀況</label>
      <div class="check-group">
        <label><input type="checkbox" name="healthCondition" value="正常"> 正常</label>
        <label><input type="checkbox" name="healthCondition" value="軟便"> 軟便</label>
        <label><input type="checkbox" name="healthCondition" value="精神不振"> 精神不振</label>
        <label><input type="checkbox" name="healthCondition" value="食慾不佳"> 食慾不佳</label>
        <label><input type="checkbox" name="healthCondition" value="嘔吐"> 嘔吐</label>
        <label><input type="checkbox" name="healthCondition" value="外傷"> 外傷</label>
        <label><input type="checkbox" name="healthCondition" value="就診"> 就診</label>
      </div>
    </div>
  </div>
</div>

<!-- SECTION 3: 預約項目 -->
<div class="section" id="section-3">
  <div class="section-title"><span>✂️</span> 預約項目</div>

  <div class="card">
    <div class="sub-label">美容主方案（選一）</div>
    <div class="service-card">
      <label><input type="radio" name="groomingService" value="毛柔乳霜洗護"> 毛柔乳霜洗護</label>
    </div>
    <div class="service-card">
      <label><input type="radio" name="groomingService" value="日本ilex神經醯胺洗浴"> 日本 ilex 神經醯胺洗浴</label>
    </div>
    <div class="service-card">
      <label><input type="radio" name="groomingService" value="不需美容"> 不需美容</label>
    </div>
  </div>

  <div class="card">
    <div class="sub-label">單項加購（可複選）</div>
    <div class="service-card">
      <label><input type="checkbox" name="additionalService" value="青蘋果保濕活膚"> 青蘋果保濕活膚</label>
    </div>
    <div class="service-card">
      <label><input type="checkbox" name="additionalService" value="金盞花舒敏護理"> 金盞花舒敏護理</label>
    </div>
    <div class="service-card">
      <label><input type="checkbox" name="additionalService" value="酪梨油氧護理"> 酪梨油氧護理</label>
    </div>
    <div class="service-card">
      <label><input type="checkbox" name="additionalService" value="皮毛調理"> 皮毛調理</label>
    </div>
    <div class="service-card">
      <label><input type="checkbox" name="additionalService" value="水療"> 水療</label>
    </div>
    <div class="service-card">
      <label><input type="checkbox" name="additionalService" value="日本ilex蘋果酵素SPA"> 日本 ilex 蘋果酵素 SPA</label>
    </div>
    <div class="service-card">
      <label><input type="checkbox" name="additionalService" value="ILEX熊笹草本溫水浴"> ILEX 熊笹草本溫水浴</label>
    </div>
    <div class="service-card">
      <label><input type="checkbox" name="additionalService" value="神的洗劑"> 神的洗劑</label>
    </div>
    <div class="service-card">
      <label><input type="checkbox" name="additionalService" value="棉花糖泡泡面膜蜂蜜"> 棉花糖泡泡面膜蜂蜜</label>
    </div>
  </div>

  <div class="card">
    <div class="sub-label">安親住宿</div>
    <div class="field">
      <label>欲預約日期</label>
      <input type="date" id="boardingDate">
      <p class="note">不需住宿請留空</p>
    </div>
  </div>

  <div class="card">
    <div class="sub-label">預約日期</div>
    <div class="field">
      <label class="required">美容預約日期</label>
      <input type="date" id="appointmentDate">
    </div>
  </div>
</div>

<!-- SECTION 4: 確認送出 -->
<div class="section" id="section-4">
  <div class="section-title"><span>📋</span> 確認同意事項</div>

  <div class="agree-box">
    <label>
      <input type="checkbox" id="agreeGrooming">
      我已閱讀並同意《美容定型化契約》，了解美容服務相關條款與注意事項。
    </label>
  </div>
  <div class="agree-box">
    <label>
      <input type="checkbox" id="agreeBoarding">
      我已閱讀並同意《寵物住宿安親同意須知》，了解住宿服務相關規定。
    </label>
  </div>

  <div class="card" style="margin-top:8px">
    <div class="sub-label">預約摘要</div>
    <div id="summary" style="font-size:14px;line-height:2;color:var(--text)"></div>
  </div>

  <p class="note" style="padding:0 4px;margin-top:8px">
    送出後系統將透過 LINE 傳送預約確認給您，如需修改請直接聯繫店家。
  </p>
</div>

<!-- Navigation -->
<div class="nav-buttons" id="nav-buttons">
  <button class="btn btn-prev" id="btn-prev" style="display:none" onclick="prevStep()">← 上一步</button>
  <button class="btn btn-next" id="btn-next" onclick="nextStep()">下一步 →</button>
</div>

<!-- Success -->
<div id="success-screen">
  <div class="success-icon">✅</div>
  <h2>預約已送出！</h2>
  <p>感謝您的預約<br>系統已透過 LINE 傳送確認訊息給您<br><br>如需更改請直接聯繫店家，謝謝！</p>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwKBUU0mv8x5igFchfhbSfw9uvnHgrKO8xkO_2Dnj-jF9x4BZQJj4sIHeVo727CLhLZ/exec';
const LIFF_ID = '2009775170-tLQpOdO7';

let currentStep = 1;
const totalSteps = 4;
let replyToken = '';
let userLineId = '';

// Init LIFF
async function initLiff() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const profile = await liff.getProfile();
    userLineId = profile.userId;
    const context = liff.getContext();
    if (context && context.utouId) replyToken = context.utouId;
  } catch (e) {
    console.log('LIFF init:', e);
  }
}
initLiff();

// Show aggression note when checked
document.querySelectorAll('input[name="behavior"]').forEach(cb => {
  cb.addEventListener('change', () => {
    const hasAggression = [...document.querySelectorAll('input[name="behavior"]:checked')]
      .some(c => c.value === '攻擊行為');
    document.getElementById('aggression-note-field').style.display = hasAggression ? 'block' : 'none';
  });
});

function getChecked(name) {
  return [...document.querySelectorAll(`input[name="${name}"]:checked`)].map(c => c.value).join('、');
}
function getRadio(name) {
  const el = document.querySelector(`input[name="${name}"]:checked`);
  return el ? el.value : '';
}

function updateProgress() {
  const fills = [0, 0, 33, 66, 100];
  document.getElementById('progress-fill').style.width = fills[currentStep] + '%';
  for (let i = 1; i <= 4; i++) {
    const dot = document.getElementById(`dot-${i}`);
    const label = document.getElementById(`label-${i}`);
    dot.className = 'step-dot' + (i < currentStep ? ' done' : i === currentStep ? ' active' : '');
    dot.textContent = i < currentStep ? '✓' : i;
    label.className = 'step-label' + (i === currentStep ? ' active' : '');
  }
  document.getElementById('btn-prev').style.display = currentStep > 1 ? 'block' : 'none';
  const btnNext = document.getElementById('btn-next');
  if (currentStep === totalSteps) {
    btnNext.textContent = '送出預約 🐾';
    btnNext.className = 'btn btn-submit';
  } else {
    btnNext.textContent = '下一步 →';
    btnNext.className = 'btn btn-next';
  }
}

function validate() {
  if (currentStep === 1) {
    if (!document.getElementById('ownerName').value.trim()) { alert('請填寫飼主姓名'); return false; }
    if (!document.getElementById('phone').value.trim()) { alert('請填寫聯絡電話'); return false; }
  }
  if (currentStep === 2) {
    if (!document.getElementById('petName').value.trim()) { alert('請填寫寵物名'); return false; }
    if (!document.getElementById('breed').value.trim()) { alert('請填寫品種'); return false; }
  }
  if (currentStep === 3) {
    if (!document.getElementById('appointmentDate').value) { alert('請選擇美容預約日期'); return false; }
  }
  if (currentStep === 4) {
    if (!document.getElementById('agreeGrooming').checked) { alert('請同意美容定型化契約'); return false; }
  }
  return true;
}

function buildSummary() {
  const items = [
    ['飼主', document.getElementById('ownerName').value],
    ['電話', document.getElementById('phone').value],
    ['寵物', document.getElementById('petName').value],
    ['品種', document.getElementById('breed').value],
    ['體重', document.getElementById('weight').value ? document.getElementById('weight').value + ' kg' : '—'],
    ['美容方案', getRadio('groomingService') || '—'],
    ['加購項目', getChecked('additionalService') || '—'],
    ['預約日期', document.getElementById('appointmentDate').value || '—'],
    ['住宿日期', document.getElementById('boardingDate').value || '不需住宿'],
  ];
  document.getElementById('summary').innerHTML = items
    .map(([k, v]) => `<div style="display:flex;justify-content:space-between;border-bottom:1px solid var(--border);padding:4px 0"><span style="color:var(--text-muted)">${k}</span><span style="font-weight:500">${v}</span></div>`)
    .join('');
}

function nextStep() {
  if (!validate()) return;
  if (currentStep === 3) buildSummary();
  if (currentStep < totalSteps) {
    document.getElementById(`section-${currentStep}`).classList.remove('active');
    currentStep++;
    document.getElementById(`section-${currentStep}`).classList.add('active');
    updateProgress();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    submitForm();
  }
}

function prevStep() {
  if (currentStep > 1) {
    document.getElementById(`section-${currentStep}`).classList.remove('active');
    currentStep--;
    document.getElementById(`section-${currentStep}`).classList.add('active');
    updateProgress();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

async function submitForm() {
  const overlay = document.getElementById('loading-overlay');
  overlay.classList.add('show');

  const otherBehaviorChecked = getChecked('otherBehavior');
  const otherBehaviorText = document.getElementById('otherBehaviorText').value;
  const otherBehaviorFull = [otherBehaviorChecked, otherBehaviorText].filter(Boolean).join('、');

  const data = {
    replyToken: replyToken,
    userLineId: userLineId,
    ownerName: document.getElementById('ownerName').value,
    phone: document.getElementById('phone').value,
    address: document.getElementById('address').value,
    idNumber: document.getElementById('idNumber').value,
    isSelf: getRadio('isSelf'),
    secondContact: document.getElementById('secondContact').value,
    petName: document.getElementById('petName').value,
    breed: document.getElementById('breed').value,
    birthday: document.getElementById('birthday').value,
    gender: getRadio('gender'),
    neutered: getRadio('neutered'),
    weight: document.getElementById('weight').value,
    length: document.getElementById('length').value,
    emotion: getChecked('emotion'),
    activity: getChecked('activity'),
    social: getChecked('social'),
    behavior: getChecked('behavior'),
    aggressionNote: document.getElementById('aggressionNote').value,
    stress: getChecked('stress'),
    bathTolerance: getChecked('bathTolerance'),
    otherBehavior: otherBehaviorFull,
    medicalHistory: document.getElementById('medicalHistory').value,
    skinCondition: getChecked('skinCondition'),
    healthCondition: getChecked('healthCondition'),
    groomingService: getRadio('groomingService'),
    additionalService: getChecked('additionalService'),
    boarding: document.getElementById('boardingDate').value,
    appointmentDate: document.getElementById('appointmentDate').value,
    agreeGrooming: document.getElementById('agreeGrooming').checked ? '同意' : '未同意',
    agreeBoarding: document.getElementById('agreeBoarding').checked ? '同意' : '未同意',
  };

  try {
    await fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    overlay.classList.remove('show');
    document.getElementById('nav-buttons').style.display = 'none';
    document.querySelector('.progress-bar').style.display = 'none';
    for (let i = 1; i <= 4; i++) document.getElementById(`section-${i}`).style.display = 'none';
    document.getElementById('success-screen').style.display = 'block';
  } catch (err) {
    overlay.classList.remove('show');
    alert('送出失敗，請稍後再試。');
  }
}
</script>
</body>
</html>
